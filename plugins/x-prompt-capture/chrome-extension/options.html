<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X Prompt Capture Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="wrap">
      <h1>X Prompt Capture Settings</h1>
      <p class="desc">Exported file path = <code>[Downloads]/&lt;Export Directory&gt;/YYYY-MM-DD.json</code></p>

      <label class="label" for="exportSubdir">Export Directory</label>
      <input id="exportSubdir" type="text" placeholder="x-prompt-json" />

      <label class="label" for="openAIBaseUrl">OpenAI Base URL</label>
      <input id="openAIBaseUrl" type="text" placeholder="https://api.openai.com" />

      <label class="label" for="openAIApiKey">OpenAI API Key</label>
      <div class="input-row">
        <input id="openAIApiKey" type="password" placeholder="sk-..." />
        <button id="toggleApiKeyBtn" class="icon-btn" type="button" aria-label="Show API key" aria-pressed="false" title="Show API key">👁</button>
      </div>

      <label class="label" for="openAIModel">OpenAI Model</label>
      <input id="openAIModel" type="text" placeholder="gpt-4o-mini" />

      <button id="saveBtn">Save</button>
      <pre id="status" class="status"></pre>
    </main>

    <script src="options.js"></script>
  </body>
</html>
